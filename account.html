<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZeusV2 — Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #04070a;
    --green: #38bdf8;
    --green-soft: #7dd3fc;
    --green-dim: #0e7490;
    --text: #eafaf2;
    --muted: #9fb8ac;
    --radius: 26px;
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.18);
    --glass-hi: rgba(255,255,255,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh;
  }
  ::selection { background: rgba(56,189,248,0.3); color: #fff; }

  body::before {
    content: ''; position: fixed; inset: -30%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(38vw 38vw at 18% 22%, rgba(56,189,248,0.55), transparent 60%),
      radial-gradient(42vw 42vw at 82% 18%, rgba(14,116,144,0.5), transparent 60%),
      radial-gradient(46vw 46vw at 50% 95%, rgba(125,211,252,0.4), transparent 60%),
      radial-gradient(30vw 30vw at 75% 80%, rgba(120,90,255,0.25), transparent 60%);
    filter: blur(60px) saturate(140%);
    animation: drift 22s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); }
    50%  { transform: translate(4%, -3%) scale(1.08) rotate(8deg); }
    100% { transform: translate(-3%, 4%) scale(1.04) rotate(-6deg); }
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(120% 120% at 50% 0%, transparent 40%, rgba(4,7,10,0.7) 100%);
  }

  #cursorGlow {
    position: fixed; top: 0; left: 0; width: 460px; height: 460px; border-radius: 50%;
    pointer-events: none; z-index: 1; transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(56,189,248,0.22), rgba(56,189,248,0.07) 35%, transparent 70%);
    filter: blur(14px); transition: opacity .4s; opacity: 0; mix-blend-mode: screen;
  }

  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; z-index: 300; background: linear-gradient(90deg, var(--green-dim), var(--green), var(--green-soft)); box-shadow: 0 0 12px var(--green); }

  .container { max-width: 480px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }

  .btn {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
    letter-spacing: 0.5px; padding: 15px 38px; border-radius: 50px;
    text-decoration: none; display: inline-block; cursor: pointer; position: relative; overflow: hidden;
    transition: transform .25s, box-shadow .25s, background .25s, color .25s;
    border: 1px solid var(--glass-border); color: var(--text);
    background: var(--glass-strong);
    backdrop-filter: blur(14px) saturate(160%); -webkit-backdrop-filter: blur(14px) saturate(160%);
    box-shadow: inset 0 1px 1px var(--glass-hi), 0 8px 24px rgba(0,0,0,0.35);
  }
  .btn-primary {
    color: #04130c; border: 1px solid rgba(56,189,248,0.5);
    background: linear-gradient(135deg, rgba(56,189,248,0.9), rgba(125,211,252,0.85));
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 10px 30px rgba(56,189,248,0.35);
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), 0 14px 44px rgba(56,189,248,0.5); }

  /* ===== Floating glass panel ===== */
  .side-panel {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    z-index: 60; display: flex; flex-direction: row; align-items: center; gap: 4px;
    padding: 8px 10px; border-radius: 50px;
    background: rgba(255,255,255,0.10); backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.22);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.55), inset 0 -1px 1px rgba(0,0,0,0.18), 0 12px 40px rgba(0,0,0,0.45);
  }
  .side-panel .sp-name {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
    letter-spacing: 1px; color: var(--green); padding: 0 14px 0 8px; text-shadow: 0 0 14px rgba(56,189,248,0.6);
  }
  .side-panel .sp-divider { width: 1px; height: 18px; background: linear-gradient(rgba(255,255,255,0.25), transparent); }
  .side-panel a {
    position: relative; color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; padding: 9px 16px; border-radius: 50px;
    transition: color .25s, background .25s, box-shadow .25s;
  }
  .side-panel a:hover { color: var(--text); background: rgba(255,255,255,0.10); }
  .side-panel a.active { color: #04130c; background: linear-gradient(135deg, var(--green), var(--green-soft)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 0 20px rgba(56,189,248,0.4); }

  /* ===== Account card ===== */
  .account-wrap { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 130px 0 60px; }
  .account-card {
    position: relative; border-radius: var(--radius); padding: 46px 40px;
    background: var(--glass); backdrop-filter: blur(26px) saturate(170%); -webkit-backdrop-filter: blur(26px) saturate(170%);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 1px var(--glass-hi), inset 0 -1px 1px rgba(0,0,0,0.25), 0 30px 80px rgba(0,0,0,0.55);
  }
  .account-card::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius); padding: 1px; pointer-events: none;
    background: linear-gradient(160deg, rgba(255,255,255,0.4), transparent 45%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }
  .account-card .tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--green); border: 1px solid var(--glass-border); border-radius: 50px;
    padding: 6px 16px; margin-bottom: 20px; letter-spacing: 1px; background: var(--glass);
  }
  .account-card h1 { font-size: clamp(30px, 5vw, 40px); font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
  .account-card h1 .accent {
    background: linear-gradient(120deg, var(--green), var(--green-soft));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .account-card .sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .field input {
    width: 100%; padding: 15px 16px; border-radius: 14px;
    background: var(--glass); border: 1px solid var(--glass-border); color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; outline: none;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: border-color .25s, box-shadow .25s;
  }
  .field input::placeholder { color: #5d6f66; }
  .field input:focus { border-color: rgba(56,189,248,0.6); box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }

  .remember { display: flex; align-items: center; gap: 10px; margin: 6px 0 24px; color: var(--muted); font-size: 14px; cursor: pointer; user-select: none; }
  .remember input { width: 17px; height: 17px; accent-color: var(--green); cursor: pointer; }

  .toggle-row { margin-top: 24px; text-align: center; color: var(--muted); font-size: 14px; }
  .toggle-row button {
    background: none; border: none; color: var(--green); font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 14px; cursor: pointer; padding: 0; margin-left: 6px;
  }
  .toggle-row button:hover { text-shadow: 0 0 10px var(--green); }

  .msg { margin-top: 18px; font-size: 13px; min-height: 18px; text-align: center; }
  .msg.error { color: #ff6b6b; }
  .msg.ok { color: var(--green); }

  @media (max-width: 900px) { .side-panel { display: none; } }
</style>
</head>
<body>

<div id="progress"></div>
<div id="cursorGlow"></div>

<aside class="side-panel">
  <div class="sp-name">ZeusV2</div>
  <div class="sp-divider"></div>
  <a href="index.html#top">Home</a>
  <div class="sp-divider"></div>
  <a href="index.html#showcase">Showcase</a>
  <div class="sp-divider"></div>
  <a href="index.html#pricing">Pricing</a>
  <div class="sp-divider"></div>
  <a href="account.html" class="active">Account</a>
</aside>

<main class="account-wrap container">
  <div class="account-card">
    <span class="tag" id="formTag">Access</span>
    <h1 id="formTitle">Welcome <span class="accent">Back</span></h1>
    <p class="sub" id="formSub">Sign in to your ZeusV2 account.</p>

    <form id="authForm" novalidate>
      <div class="field" id="usernameField" style="display:none;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Your username" autocomplete="username" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <label class="remember" id="rememberRow" style="display:none;">
        <input type="checkbox" id="remember" checked />
        <span>Remember me (stay signed in)</span>
      </label>
      <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;">Sign In</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="toggle-row">
      <span id="toggleText">No account yet?</span>
      <button type="button" id="toggleBtn">Create one</button>
    </div>
  </div>
</main>

<script>
  let mode = 'login';

  const form = document.getElementById('authForm');
  const usernameField = document.getElementById('usernameField');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const toggleBtn = document.getElementById('toggleBtn');
  const toggleText = document.getElementById('toggleText');
  const formTitle = document.getElementById('formTitle');
  const formSub = document.getElementById('formSub');
  const formTag = document.getElementById('formTag');

  function setMode(next) {
    mode = next;
    msg.textContent = '';
    msg.className = 'msg';
    if (mode === 'login') {
      usernameField.style.display = 'none';
      document.getElementById('rememberRow').style.display = 'flex';
      formTag.textContent = 'Access';
      formTitle.innerHTML = 'Welcome <span class="accent">Back</span>';
      formSub.textContent = 'Sign in to your ZeusV2 account.';
      submitBtn.textContent = 'Sign In';
      toggleText.textContent = 'No account yet?';
      toggleBtn.textContent = 'Create one';
      passwordInput.setAttribute('autocomplete', 'current-password');
    } else {
      usernameField.style.display = 'block';
      document.getElementById('rememberRow').style.display = 'none';
      formTag.textContent = 'Join';
      formTitle.innerHTML = 'Create <span class="accent">Account</span>';
      formSub.textContent = 'Register to get access to ZeusV2.';
      submitBtn.textContent = 'Register';
      toggleText.textContent = 'Already have an account?';
      toggleBtn.textContent = 'Sign in';
      passwordInput.setAttribute('autocomplete', 'new-password');
    }
  }

  toggleBtn.addEventListener('click', () => { setMode(mode === 'login' ? 'register' : 'login'); });
  setMode('login');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    msg.className = 'msg';
    msg.textContent = '';

    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const username = usernameField.querySelector('input').value.trim();

    if (!email || !password) { msg.className = 'msg error'; msg.textContent = 'Email and password are required.'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { msg.className = 'msg error'; msg.textContent = 'Please enter a valid email address.'; return; }
    if (password.length < 6) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return; }
    if (mode === 'register' && !username) { msg.className = 'msg error'; msg.textContent = 'Username is required.'; return; }

    try {
      const accounts = JSON.parse(localStorage.getItem('zeus-accounts') || '[]');
      if (mode === 'register') {
        if (accounts.some(a => a.email === email || a.username === username)) {
          msg.className = 'msg error'; msg.textContent = 'Account with this email or username already exists.'; return;
        }
        const uid = 'ZV-' + Math.random().toString(36).slice(2, 10).toUpperCase();
        accounts.push({ email, username, password, uid, subscription: 'none' });
        localStorage.setItem('zeus-accounts', JSON.stringify(accounts));
        msg.className = 'msg ok'; msg.textContent = 'Account created! Signing you in…';
        localStorage.setItem('zeus-session', username);
        setTimeout(() => { window.location.href = 'profile.html'; }, 900);
      } else {
        const found = accounts.find(a => a.email === email && a.password === password);
        if (!found) { msg.className = 'msg error'; msg.textContent = 'Invalid email or password.'; return; }
        const sessionKey = found.username || found.email;
        localStorage.setItem('zeus-session', sessionKey);
        if (document.getElementById('remember').checked) {
          sessionStorage.removeItem('zeus-session');
        } else {
          sessionStorage.setItem('zeus-session', sessionKey);
        }
        msg.className = 'msg ok'; msg.textContent = 'Signed in as ' + sessionKey + '. Redirecting…';
        setTimeout(() => { window.location.href = 'profile.html'; }, 900);
      }
    } catch (err) {
      msg.className = 'msg error'; msg.textContent = 'Something went wrong.';
    }
  });

  const progress = document.getElementById('progress');
  const onScroll = () => {
    const h = document.documentElement;
    progress.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
  };
  window.addEventListener('scroll', onScroll); onScroll();

  /* ===== Cursor glow ===== */
  const cursorGlow = document.getElementById('cursorGlow');
  let cgX = window.innerWidth / 2, cgY = window.innerHeight / 2;
  let tgX = cgX, tgY = cgY;
  window.addEventListener('mousemove', (e) => {
    tgX = e.clientX; tgY = e.clientY;
    cursorGlow.style.opacity = '1';
  });
  window.addEventListener('mouseleave', () => { cursorGlow.style.opacity = '0'; });
  const renderGlow = () => {
    cgX += (tgX - cgX) * 0.15;
    cgY += (tgY - cgY) * 0.15;
    cursorGlow.style.left = cgX + 'px';
    cursorGlow.style.top = cgY + 'px';
    requestAnimationFrame(renderGlow);
  };
  renderGlow();

</script>
</body>
</html>
