<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZeusV2 — Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --white: #ffffff;
    --green: #22c55e;
    --green-soft: #4ade80;
    --muted: rgba(255,255,255,0.5);
    --error: #ff6b6b;
    --glass-bg: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1c231d; color: var(--white);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow-x: hidden;
    opacity: 0; animation: pageFade 0.6s ease forwards;
  }
  @keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  ::selection { background: rgba(34,197,94,0.3); color: #fff; }
  :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

  /* BG layers */
  .bg-img {
    position: fixed; inset: 0; z-index: 0;
    background: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80') center/cover no-repeat;
    transform: scale(1.1);
  }
  .bg-img::after { content: ''; position: absolute; inset: 0; background: rgba(10,26,15,0.8); }
  .bg-vignette {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(10,26,15,0.85) 100%);
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 440px; padding: 24px;
  }

  .card {
    padding: 48px 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    position: relative;
    opacity: 0; transform: translateY(20px); animation: cardUp 0.7s 0.15s ease forwards;
  }
  @keyframes cardUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px; padding: 1px; pointer-events: none;
    background: linear-gradient(160deg, rgba(255,255,255,0.15), transparent 50%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }

  .tag {
    display: inline-block; font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--green); border: 1px solid rgba(34,197,94,0.3);
    border-radius: 50px; padding: 5px 14px; margin-bottom: 20px;
    background: rgba(34,197,94,0.06);
  }
  h1 {
    font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px;
  }
  h1 .accent {
    background: linear-gradient(135deg, var(--green), var(--green-soft));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .field input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    color: var(--white); font-family: 'Inter', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.25); }
  .field input:focus { border-color: rgba(34,197,94,0.5); box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
  .field-error {
    font-size: 12px; color: var(--error); margin-top: 6px; display: none;
  }
  .field-error.show { display: block; }

  .remember {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0 24px; color: var(--muted); font-size: 14px; cursor: pointer; user-select: none;
  }
  .remember input { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }

.btn-submit {
    width: 100%; padding: 14px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    background: rgba(255,255,255,0.06);
    color: var(--white);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
    position: relative; overflow: hidden;
}
.btn-submit:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
}
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-submit.loading { color: transparent; pointer-events: none; }
.btn-submit.loading::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
    margin: -10px 0 0 -10px; border: 2px solid #04130c; border-right-color: transparent;
    border-radius: 50%; animation: spin 0.6s linear infinite;
}
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg { margin-top: 16px; font-size: 13px; min-height: 18px; text-align: center; }
  .msg.error { color: var(--error); }
  .msg.ok { color: var(--green); }
  .msg.warn { color: #ffb86b; }

  .toggle-row { margin-top: 24px; text-align: center; color: var(--muted); font-size: 14px; }
  .toggle-row button {
    background: none; border: none; color: var(--green); font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 14px; cursor: pointer; padding: 0; margin-left: 6px;
  }
  .toggle-row button:hover { text-shadow: 0 0 10px var(--green); }

  .back-link {
    display: block; text-align: center; margin-top: 20px;
    color: var(--muted); font-size: 13px; text-decoration: none;
    transition: color 0.25s;
  }
  .back-link:hover { color: var(--white); }

  /* Nav */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,26,15,0.85);
    backdrop-filter: blur(20px) saturate(160%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-brand {
    font-size: 16px; font-weight: 800; letter-spacing: 2px; color: var(--white);
    text-decoration: none; text-shadow: 0 0 16px rgba(34,197,94,0.4);
  }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600;
    letter-spacing: 0.5px; padding: 8px 16px; border-radius: 50px;
    transition: color 0.25s, background 0.25s;
  }
  .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.08); }
  .nav-links a.active {
    color: #04130c; background: linear-gradient(135deg, var(--green), var(--green-soft));
  }

  @media (max-width: 768px) {
    .nav-links { display: none; }
    .card { padding: 36px 28px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="bg-img"></div>
<div class="bg-vignette"></div>

<nav class="nav">
  <a href="index.html" class="nav-brand">ZEUSV2</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    
    <a href="index.html#showcase">Showcase</a>
    <a href="index.html#pricing">Pricing</a>
    <a href="account.html" class="active">Account</a>
  </div>
</nav>

<main class="wrap">
  <div class="card">
    <span class="tag" id="formTag">Access</span>
    <h1 id="formTitle">Welcome <span class="accent">Back</span></h1>
    <p class="sub" id="formSub">Sign in to your ZeusV2 account.</p>

    <form id="authForm" novalidate>
      <div class="field" id="usernameField" style="display:none;">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username" autocomplete="username" />
        <div class="field-error" id="usernameError"></div>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <div class="field-error" id="emailError"></div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        <div class="field-error" id="passwordError"></div>
      </div>
      <label class="remember" id="rememberRow">
        <input type="checkbox" id="remember" checked />
        <span>Remember me</span>
      </label>
      <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="toggle-row">
      <span id="toggleText">No account yet?</span>
      <button type="button" id="toggleBtn">Create one</button>
    </div>
  </div>
  <a href="index.html" class="back-link">Back to Home</a>
</main>

<script>
(() => {
  'use strict';
  let mode = 'login';
  const form = document.getElementById('authForm');
  const usernameField = document.getElementById('usernameField');
  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const toggleBtn = document.getElementById('toggleBtn');
  const toggleText = document.getElementById('toggleText');
  const formTitle = document.getElementById('formTitle');
  const formSub = document.getElementById('formSub');
  const formTag = document.getElementById('formTag');
  const rememberRow = document.getElementById('rememberRow');

  function clearErrors() {
    [usernameInput, emailInput, passwordInput].forEach(i => {
      i.removeAttribute('aria-invalid');
      const err = i.parentElement.querySelector('.field-error');
      if (err) { err.textContent = ''; err.classList.remove('show'); }
    });
  }
  function showError(input, text) {
    input.setAttribute('aria-invalid', 'true');
    const err = input.parentElement.querySelector('.field-error');
    if (err) { err.textContent = text; err.classList.add('show'); }
  }
  function setLoading(loading) {
    if (loading) { submitBtn.classList.add('loading'); submitBtn.disabled = true; }
    else { submitBtn.classList.remove('loading'); submitBtn.disabled = false; }
  }

  function setMode(next) {
    mode = next; msg.textContent = ''; msg.className = 'msg'; clearErrors();
    if (mode === 'login') {
      usernameField.style.display = 'none';
      rememberRow.style.display = 'flex';
      formTag.textContent = 'Access';
      formTitle.innerHTML = 'Welcome <span class="accent">Back</span>';
      formSub.textContent = 'Sign in to your ZeusV2 account.';
      submitBtn.textContent = 'Sign In';
      toggleText.textContent = 'No account yet?';
      toggleBtn.textContent = 'Create one';
    } else {
      usernameField.style.display = 'block';
      rememberRow.style.display = 'none';
      formTag.textContent = 'Join';
      formTitle.innerHTML = 'Create <span class="accent">Account</span>';
      formSub.textContent = 'Register to get access to ZeusV2.';
      submitBtn.textContent = 'Register';
      toggleText.textContent = 'Already have an account?';
      toggleBtn.textContent = 'Sign in';
    }
  }
  toggleBtn.addEventListener('click', () => setMode(mode === 'login' ? 'register' : 'login'));
  setMode('login');

  async function hashPwd(pwd) {
    const data = new TextEncoder().encode(pwd);
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault(); msg.textContent = ''; msg.className = 'msg'; clearErrors();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const username = usernameInput.value.trim();
    let valid = true;
    if (!email) { showError(emailInput, 'Email is required'); valid = false; }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError(emailInput, 'Invalid email'); valid = false; }
    if (!password) { showError(passwordInput, 'Password is required'); valid = false; }
    else if (password.length < 6) { showError(passwordInput, 'Min 6 characters'); valid = false; }
    if (mode === 'register' && !username) { showError(usernameInput, 'Username is required'); valid = false; }
    if (!valid) return;

    setLoading(true);
    try {
      const accounts = JSON.parse(localStorage.getItem('zeus-accounts') || '[]');
      if (mode === 'register') {
        if (accounts.some(a => a.email === email || a.username === username)) {
          msg.className = 'msg error'; msg.textContent = 'Account already exists.'; return;
        }
        const hashed = await hashPwd(password);
        accounts.push({ email, username, password: hashed, uid: 'ZV-' + Math.random().toString(36).slice(2,10).toUpperCase(), subscription: 'none' });
        localStorage.setItem('zeus-accounts', JSON.stringify(accounts));
        localStorage.setItem('zeus-session', username);
        msg.className = 'msg ok'; msg.textContent = 'Created! Signing in…';
        setTimeout(() => { window.location.href = 'profile.html'; }, 800);
      } else {
        const found = accounts.find(a => a.email === email);
        if (!found) { msg.className = 'msg error'; msg.textContent = 'Invalid email or password.'; return; }
        const hashed = await hashPwd(password);
        if (hashed !== found.password) { msg.className = 'msg error'; msg.textContent = 'Invalid email or password.'; return; }
        const key = found.username || found.email;
        if (document.getElementById('remember').checked) localStorage.setItem('zeus-session', key);
        else sessionStorage.setItem('zeus-session', key);
        msg.className = 'msg ok'; msg.textContent = 'Signed in. Redirecting…';
        setTimeout(() => { window.location.href = 'profile.html'; }, 800);
      }
    } catch { msg.className = 'msg error'; msg.textContent = 'Something went wrong.'; }
    finally { setLoading(false); }
  });
})();
</script>
</body>
</html>
