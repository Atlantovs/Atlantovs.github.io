<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZeusV2 — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #04070a;
    --green: #38bdf8;
    --green-soft: #7dd3fc;
    --green-dim: #0e7490;
    --text: #eafaf2;
    --muted: #9fb8ac;
    --radius: 26px;
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.18);
    --glass-hi: rgba(255,255,255,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh;
  }
  ::selection { background: rgba(56,189,248,0.3); color: #fff; }

  body::before {
    content: ''; position: fixed; inset: -30%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(38vw 38vw at 18% 22%, rgba(56,189,248,0.55), transparent 60%),
      radial-gradient(42vw 42vw at 82% 18%, rgba(14,116,144,0.5), transparent 60%),
      radial-gradient(46vw 46vw at 50% 95%, rgba(125,211,252,0.4), transparent 60%),
      radial-gradient(30vw 30vw at 75% 80%, rgba(120,90,255,0.25), transparent 60%);
    filter: blur(60px) saturate(140%);
    animation: drift 22s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); }
    50%  { transform: translate(4%, -3%) scale(1.08) rotate(8deg); }
    100% { transform: translate(-3%, 4%) scale(1.04) rotate(-6deg); }
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(120% 120% at 50% 0%, transparent 40%, rgba(4,7,10,0.7) 100%);
  }

  #cursorGlow {
    position: fixed; top: 0; left: 0; width: 460px; height: 460px; border-radius: 50%;
    pointer-events: none; z-index: 1; transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(56,189,248,0.22), rgba(56,189,248,0.07) 35%, transparent 70%);
    filter: blur(14px); transition: opacity .4s; opacity: 0; mix-blend-mode: screen;
  }

  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; z-index: 300; background: linear-gradient(90deg, var(--green-dim), var(--green), var(--green-soft)); box-shadow: 0 0 12px var(--green); }

  .container { max-width: 580px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }

  .btn {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
    letter-spacing: 0.5px; padding: 15px 38px; border-radius: 50px;
    text-decoration: none; display: inline-block; cursor: pointer; position: relative; overflow: hidden;
    transition: transform .25s, box-shadow .25s, background .25s, color .25s;
    border: 1px solid var(--glass-border); color: var(--text);
    background: var(--glass-strong);
    backdrop-filter: blur(14px) saturate(160%); -webkit-backdrop-filter: blur(14px) saturate(160%);
    box-shadow: inset 0 1px 1px var(--glass-hi), 0 8px 24px rgba(0,0,0,0.35);
    margin-top: 16px;
  }
  .btn-primary {
    color: #04130c; border: 1px solid rgba(56,189,248,0.5);
    background: linear-gradient(135deg, rgba(56,189,248,0.9), rgba(125,211,252,0.85));
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 10px 30px rgba(56,189,248,0.35);
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), 0 14px 44px rgba(56,189,248,0.5); }
  .btn-ghost { background: var(--glass); color: var(--green); }
  .btn-ghost:hover { transform: translateY(-3px); background: var(--glass-strong); box-shadow: inset 0 1px 1px var(--glass-hi), 0 12px 34px rgba(56,189,248,0.25); }
  .btn-outline {
    color: var(--green); border: 1px solid rgba(56,189,248,0.5);
    background: var(--glass); box-shadow: inset 0 1px 1px var(--glass-hi), 0 8px 24px rgba(0,0,0,0.35);
  }
  .btn-outline:hover { transform: translateY(-3px); background: rgba(56,189,248,0.12); box-shadow: inset 0 1px 1px var(--glass-hi), 0 12px 34px rgba(56,189,248,0.25); }

  /* ===== Floating glass panel ===== */
  .side-panel {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    z-index: 60; display: flex; flex-direction: row; align-items: center; gap: 4px;
    padding: 8px 10px; border-radius: 50px;
    background: rgba(255,255,255,0.10); backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.22);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.55), inset 0 -1px 1px rgba(0,0,0,0.18), 0 12px 40px rgba(0,0,0,0.45);
  }
  .side-panel .sp-name {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
    letter-spacing: 1px; color: var(--green); padding: 0 14px 0 8px; text-shadow: 0 0 14px rgba(56,189,248,0.6);
  }
  .side-panel .sp-divider { width: 1px; height: 18px; background: linear-gradient(rgba(255,255,255,0.25), transparent); }
  .side-panel a {
    position: relative; color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; padding: 9px 16px; border-radius: 50px;
    transition: color .25s, background .25s, box-shadow .25s;
  }
  .side-panel a:hover { color: var(--text); background: rgba(255,255,255,0.10); }
  .side-panel a.active { color: #04130c; background: linear-gradient(135deg, var(--green), var(--green-soft)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 0 20px rgba(56,189,248,0.4); }

  /* ===== Profile ===== */
  .profile-wrap { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 130px 0 60px; }
  .profile-card {
    position: relative; border-radius: var(--radius); padding: 46px 40px;
    background: var(--glass); backdrop-filter: blur(26px) saturate(170%); -webkit-backdrop-filter: blur(26px) saturate(170%);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 1px var(--glass-hi), inset 0 -1px 1px rgba(0,0,0,0.25), 0 30px 80px rgba(0,0,0,0.55);
  }
  .profile-card::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius); padding: 1px; pointer-events: none;
    background: linear-gradient(160deg, rgba(255,255,255,0.4), transparent 45%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }
  .profile-head { display: flex; align-items: center; gap: 20px; margin-bottom: 34px; }
  .avatar {
    width: 68px; height: 68px; border-radius: 50%; flex-shrink: 0; object-fit: cover;
    display: block; background: var(--glass);
    box-shadow: 0 0 30px rgba(56,189,248,0.5), inset 0 1px 1px rgba(255,255,255,0.6);
    border: 1px solid var(--glass-border);
  }
  .profile-head .ph-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .profile-head .ph-sub { color: var(--muted); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 0; border-bottom: 1px solid var(--glass-border);
  }
  .info-row:last-of-type { border-bottom: none; }
  .info-row .label {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
  }
  .info-row .value { font-weight: 600; font-size: 15px; word-break: break-all; text-align: right; }
  .info-row .value.mono { font-family: 'JetBrains Mono', monospace; }

  .badge-sub {
    display: inline-block; padding: 5px 14px; border-radius: 50px; font-size: 12px;
    font-weight: 700; letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace;
  }
  .badge-sub.active { background: rgba(56,189,248,0.18); color: var(--green); border: 1px solid rgba(56,189,248,0.5); box-shadow: 0 0 16px rgba(56,189,248,0.3); }
  .badge-sub.none { background: var(--glass); color: var(--muted); border: 1px solid var(--glass-border); }
  .badge-sub.frozen { background: rgba(255,184,107,0.15); color: #ffb86b; border: 1px solid rgba(255,184,107,0.5); box-shadow: 0 0 16px rgba(255,184,107,0.25); }

  .freeze-btn {
    margin-top: 20px; width: 100%; font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 13px; letter-spacing: 0.5px; padding: 13px; border-radius: 50px; cursor: pointer;
    background: var(--glass); color: var(--muted); border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: background .25s, color .25s, border-color .25s;
  }
  .freeze-btn:hover { color: #ffb86b; border-color: rgba(255,184,107,0.5); background: rgba(255,184,107,0.1); }
  .freeze-btn.frozen { color: var(--green); border-color: rgba(56,189,248,0.5); }
  .freeze-btn.frozen:hover { background: rgba(56,189,248,0.12); }

  .cancel-btn {
    margin-top: 12px; width: 100%; font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 13px; letter-spacing: 0.5px; padding: 13px; border-radius: 50px; cursor: pointer;
    background: var(--glass); color: var(--muted); border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: background .25s, color .25s, border-color .25s;
  }
  .cancel-btn:hover { color: #ffb86b; border-color: rgba(255,184,107,0.5); background: rgba(255,184,107,0.1); }

  .msg { margin-top: 18px; font-size: 13px; text-align: center; color: var(--muted); min-height: 18px; }

  @media (max-width: 900px) { .side-panel { display: none; } }
</style>
</head>
<body>

<div id="progress"></div>
<div id="cursorGlow"></div>

<aside class="side-panel">
  <div class="sp-name">ZeusV2</div>
  <div class="sp-divider"></div>
  <a href="index.html#top">Home</a>
  <div class="sp-divider"></div>
  <a href="index.html#showcase">Showcase</a>
  <div class="sp-divider"></div>
  <a href="index.html#pricing">Pricing</a>
  <div class="sp-divider"></div>
  <a href="account.html">Account</a>
  <div class="sp-divider"></div>
  <a href="profile.html" class="active">Profile</a>
</aside>

<main class="profile-wrap container">
  <div class="profile-card">
    <div class="profile-head">
      <img class="avatar" id="avatar" src="pfp.jpg" alt="Profile" />
      <div>
        <div class="ph-name" id="displayName">—</div>
        <div class="ph-sub">ZeusV2 Member</div>
      </div>
    </div>

    <div class="info-row">
      <span class="label">Username</span>
      <span class="value" id="outUsername">—</span>
    </div>
    <div class="info-row">
      <span class="label">UID</span>
      <span class="value mono" id="outUid">—</span>
    </div>
    <div class="info-row">
      <span class="label">Subscription</span>
      <span class="value"><span class="badge-sub none" id="outSub">No active plan</span></span>
    </div>

    <button type="button" class="freeze-btn" id="freezeBtn">Freeze Subscription</button>
    <button type="button" class="cancel-btn" id="cancelBtn">Cancel Subscription</button>

    <button type="button" class="freeze-btn" id="logoutBtn" style="width:100%; text-align:center;">Log Out</button>
    <div class="msg" id="msg"></div>
  </div>
</main>

<script>
  function getAccounts() {
    try { return JSON.parse(localStorage.getItem('zeus-accounts') || '[]'); }
    catch (e) { return []; }
  }

  const sessionUser = localStorage.getItem('zeus-session') || sessionStorage.getItem('zeus-session');
  const accounts = getAccounts();
  const acc = accounts.find(a => a.username === sessionUser || a.email === sessionUser);

  const msg = document.getElementById('msg');
  const subEl = document.getElementById('outSub');
  const freezeBtn = document.getElementById('freezeBtn');
  const cancelBtn = document.getElementById('cancelBtn');

  function renderSubscription() {
    const sub = acc.subscription;
    const frozen = acc.frozen === true;
    const hasSub = sub && sub !== 'none' && sub !== '';
    if (!hasSub) {
      subEl.className = 'badge-sub none';
      subEl.textContent = 'No active plan';
      freezeBtn.style.display = 'none';
      cancelBtn.style.display = 'none';
      return;
    }
    freezeBtn.style.display = 'block';
    cancelBtn.style.display = 'block';
    if (frozen) {
      subEl.className = 'badge-sub frozen';
      subEl.textContent = 'Frozen (' + sub + ')';
      freezeBtn.textContent = 'Unfreeze Subscription';
      freezeBtn.classList.add('frozen');
    } else {
      subEl.className = 'badge-sub active';
      subEl.textContent = sub;
      freezeBtn.textContent = 'Freeze Subscription';
      freezeBtn.classList.remove('frozen');
    }
  }

  function saveAccounts() { localStorage.setItem('zeus-accounts', JSON.stringify(accounts)); }

  if (!acc) {
    msg.textContent = 'You are not signed in. Redirecting…';
    setTimeout(() => { window.location.href = 'account.html'; }, 1200);
  } else {
    const username = acc.username || acc.email;
    document.getElementById('displayName').textContent = username;
    document.getElementById('outUsername').textContent = username;
    document.getElementById('outUid').textContent = acc.uid || '—';
    renderSubscription();
  }

  freezeBtn.addEventListener('click', () => {
    if (!acc) return;
    if (acc.subscription === 'none' || !acc.subscription) { msg.textContent = 'No active subscription to freeze.'; return; }
    if (acc.frozen) { acc.frozen = false; msg.textContent = 'Subscription unfrozen: ' + acc.subscription + '.'; }
    else { acc.frozen = true; msg.textContent = 'Subscription frozen. Time paused.'; }
    saveAccounts(); renderSubscription();
  });

  cancelBtn.addEventListener('click', () => {
    if (!acc) return;
    if (!acc.subscription || acc.subscription === 'none') { msg.textContent = 'No active subscription to cancel.'; return; }
    const cancelled = acc.subscription;
    acc.subscription = 'none';
    acc.frozen = false;
    saveAccounts();
    msg.textContent = 'Subscription cancelled: ' + cancelled + '.';
    renderSubscription();
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('zeus-session');
    sessionStorage.removeItem('zeus-session');
    window.location.href = 'account.html';
  });

  const progress = document.getElementById('progress');
  const onScroll = () => {
    const h = document.documentElement;
    progress.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
  };
  window.addEventListener('scroll', onScroll); onScroll();

  /* ===== Cursor glow ===== */
  const cursorGlow = document.getElementById('cursorGlow');
  let cgX = window.innerWidth / 2, cgY = window.innerHeight / 2;
  let tgX = cgX, tgY = cgY;
  window.addEventListener('mousemove', (e) => {
    tgX = e.clientX; tgY = e.clientY;
    cursorGlow.style.opacity = '1';
  });
  window.addEventListener('mouseleave', () => { cursorGlow.style.opacity = '0'; });
  const renderGlow = () => {
    cgX += (tgX - cgX) * 0.15;
    cgY += (tgY - cgY) * 0.15;
    cursorGlow.style.left = cgX + 'px';
    cursorGlow.style.top = cgY + 'px';
    requestAnimationFrame(renderGlow);
  };
  renderGlow();

</script>
</body>
</html>
